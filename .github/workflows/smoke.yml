name: Smoke (PR)

# Critical-path @smoke suite on every PR (and manual dispatch). Fast & stable.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      BASE_URL: ${{ secrets.BASE_URL }}
      DEFAULT_LANGUAGE: en
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_OTP: ${{ secrets.ADMIN_OTP }}
      COMPANY_ADMIN_USERNAME: ${{ secrets.COMPANY_ADMIN_USERNAME }}
      COMPANY_ADMIN_PASSWORD: ${{ secrets.COMPANY_ADMIN_PASSWORD }}
      COMPANY_ADMIN_OTP: ${{ secrets.COMPANY_ADMIN_OTP }}
      INDIVIDUAL_USERNAME: ${{ secrets.INDIVIDUAL_USERNAME }}
      INDIVIDUAL_PASSWORD: ${{ secrets.INDIVIDUAL_PASSWORD }}
      INDIVIDUAL_OTP: ${{ secrets.INDIVIDUAL_OTP }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run @smoke
        run: npx playwright test --grep @smoke

      - name: Upload HTML report + traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14

      - name: Upload healing report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-healing-report
          path: healing-report/
          retention-days: 14
          if-no-files-found: ignore
